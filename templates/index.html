<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiftLog</title>
</head>
<body>
    <h1>LiftLog</h1>

    <h2>My Workout Splits</h2>
    {% if splits %}
        {% for split in splits %}
            <div>
                <h3>{{ split.name }}</h3>
                <a href="/split/{{ split.id }}">View Split</a>
                <a href="/log/{{ split.id }}">Log Workout</a>
            </div>
        {% endfor %}
    {% else %}
        <p>You have no workout splits yet.</p>
    {% endif %}

    <a href="/create-split">+ Create a Workout Split</a>

    <hr>
    <h2>Exercises</h2>
    <a href="/exercises">Manage Exercises</a>
</body>
</html>
