<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiftLog</title>
</head>
<body>
    <h1>LiftLog</h1>

    <h2>My Workout Splits</h2>
    {% if splits %}
        {% for split in splits %}
            <div>
                <h3>{{ split.name }}</h3>
                <a href="/split/{{ split.id }}">View Split</a>
                <a href="/log/{{ split.id }}">Log Workout</a>
                <form action="/split/{{ split.id }}/delete" method="POST" style="display:inline;">
                    <button type="submit" onclick="return confirm('Delete {{ split.name }}?')">Delete</button>
                </form>
            </div>
        {% endfor %}
    {% else %}
        <p>You have no workout splits yet.</p>
    {% endif %}

    <a href="/create-split">+ Create a Workout Split</a>

    <hr>
    <h2>Exercises</h2>
    <a href="/exercises">Manage Exercises</a>
    <a href="/progress">My Progress</a>

    <hr>
    <h2>Last 2 Weeks</h2>
    <div id="calendar-container">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
            <span style="color:gray; font-size:0.9em;" id="date-range"></span>
            <span><span id="active-days-count" style="font-size:1.5em; font-weight:bold;"></span> <span style="color:gray; font-size:0.85em;">active days</span></span>
        </div>

        <!-- Day headers -->
        <div style="display:grid; grid-template-columns:repeat(7, 1fr); text-align:center; margin-bottom:6px;">
            <span style="color:gray; font-size:0.8em;">S</span>
            <span style="color:gray; font-size:0.8em;">M</span>
            <span style="color:gray; font-size:0.8em;">T</span>
            <span style="color:gray; font-size:0.8em;">W</span>
            <span style="color:gray; font-size:0.8em;">T</span>
            <span style="color:gray; font-size:0.8em;">F</span>
            <span style="color:gray; font-size:0.8em;">S</span>
        </div>

        <!-- Calendar grid -->
        <div id="calendar-grid" style="display:grid; grid-template-columns:repeat(7, 1fr); gap:4px; text-align:center;"></div>
    </div>

    <script>
        const workoutDates = {{ workout_dates | tojson }};
        const today = "{{ today }}";
        const twoWeeksAgo = "{{ two_weeks_ago }}";

        // Build the 14 day range
        const startDate = new Date(twoWeeksAgo + "T00:00:00");
        const endDate = new Date(today + "T00:00:00");

        // Show date range label
        const monthNames = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
        document.getElementById("date-range").textContent =
            monthNames[startDate.getMonth()] + " " + startDate.getDate() +
            " - " +
            monthNames[endDate.getMonth()] + " " + endDate.getDate();

        // Count active days
        document.getElementById("active-days-count").textContent = workoutDates.length;

        // Fill empty cells before the first day of the range
        const grid = document.getElementById("calendar-grid");
        const firstDayOfWeek = startDate.getDay(); // 0=Sun, 6=Sat
        for (let i = 0; i < firstDayOfWeek; i++) {
            const empty = document.createElement("div");
            grid.appendChild(empty);
        }

        // Build each day cell
        let current = new Date(startDate);
        while (current <= endDate) {
            const dateStr = current.toISOString().split("T")[0];
            const isActive = workoutDates.includes(dateStr);
            const isToday = dateStr === today;

            const cell = document.createElement("div");
            cell.style = `
                padding: 8px 4px;
                border-radius: 8px;
                font-weight: ${isActive ? "bold" : "normal"};
                background: ${isActive ? "#222" : "transparent"};
                color: ${isActive ? "white" : isToday ? "black" : "gray"};
                font-size: 0.95em;
            `;
            cell.textContent = current.getDate();
            grid.appendChild(cell);

            current.setDate(current.getDate() + 1);
        }
    </script>
</body>
</html>
</body>
</html>
